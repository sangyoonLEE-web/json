<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .openBtn {
        padding: 10px 20px;
        cursor: pointer;
      }
      /* 모달 배경 */
      .modal {
        position: fixed;
        left: 0;
        top: 0;

        width: 100%;
        height: 100vh;

        background: rgba(0, 0, 0, 0.5);

        display: none;

        justify-content: center;
        align-items: center;
      }

      .modal-content {
        width: 300px;
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        position: relative;
      }
      /* 닫기 버튼 */
      .closeBtn {
        position: absolute;
        right: 15px;
        top: 10px;

        cursor: pointer;
        font-size: 20px;
      }
    </style>
  </head>

  <body>
    <!-- 열기버튼 -->
    <button class="openBtn">모달열기</button>
    <!-- 모달 -->
    <div class="modal">
      <div class="modal-content">
        <span class="closeBtn">X</span>
        <h2>로그인 창</h2>
        <p>모달 내용</p>
      </div>
    </div>

    <script>
      // 값 받기
      const openBtn = document.querySelector(".openBtn");
      const modal = document.querySelector(".modal");
      const closeBtn = document.querySelector(".closeBtn");
      // 이벤트 실행하기
      // 모달열기
      openBtn.addEventListener("click", () => {
        modal.style.display = "flex";
      });

      //   닫기 버튼 클릭
      closeBtn.addEventListener("click", () => {
        modal.style.display = "none";
      });
      // 배경 클릭시 닫기
      modal.addEventListener("click", (e) => {
        // e.target.style.display = "none";
        // 모달 클릭했을 때만 닫기
        if (e.target === modal) {
          e.target.style.display = "none";
        }
      });
    </script>
  </body>
</html>
